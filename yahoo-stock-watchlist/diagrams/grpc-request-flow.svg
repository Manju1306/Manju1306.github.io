<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>gRPC Server — Request Flow Through Layers</title>
  <desc>How a gRPC client request flows through TLS, JWT auth interceptor, QuoteService handler, and MarketDataEngine</desc>
  <style>
    .heading { font-family: system-ui, sans-serif; font-size: 15px; fill: #111; font-weight: 700; text-anchor: middle; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .layer-tls { fill: #dbeafe; stroke: #3b82f6; }
    .layer-auth { fill: #fce7f3; stroke: #ec4899; }
    .layer-svc { fill: #d1fae5; stroke: #10b981; }
    .layer-eng { fill: #2563eb; stroke: #2563eb; }
    .neutral { fill: #f3f4f6; stroke: #d1d5db; }
    .label { font-family: system-ui, sans-serif; font-size: 12px; fill: #111; text-anchor: middle; font-weight: 600; }
    .label-w { font-family: system-ui, sans-serif; font-size: 12px; fill: #fff; text-anchor: middle; font-weight: 600; }
    .sub { font-family: system-ui, sans-serif; font-size: 10px; fill: #555; text-anchor: middle; }
    .sub-w { font-family: system-ui, sans-serif; font-size: 10px; fill: rgba(255,255,255,0.8); text-anchor: middle; }
    .arrow { stroke: #999; stroke-width: 1.5; fill: none; marker-end: url(#rf-a); }
    .arrow-b { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#rf-ab); }
    .arrow-back { stroke: #10b981; stroke-width: 1.5; fill: none; marker-end: url(#rf-ag); stroke-dasharray: 5,3; }
    .note { font-family: system-ui, sans-serif; font-size: 10px; fill: #888; font-style: italic; text-anchor: middle; }
    .badge { font-family: system-ui, sans-serif; font-size: 9px; fill: #fff; text-anchor: middle; font-weight: 700; }
    .legend-text { font-family: system-ui, sans-serif; font-size: 10px; fill: #666; text-anchor: start; }
  </style>
  <defs>
    <marker id="rf-a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#999" /></marker>
    <marker id="rf-ab" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#2563eb" /></marker>
    <marker id="rf-ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#10b981" /></marker>
  </defs>

  <text x="360" y="28" class="heading">gRPC Server — Request Flow Through Layers</text>

  <!-- Client -->
  <rect x="40" y="160" width="100" height="60" class="box neutral" />
  <text x="90" y="186" class="label">gRPC Client</text>
  <text x="90" y="200" class="sub">grpcurl, apps</text>

  <!-- TLS — badge ABOVE box -->
  <circle cx="250" cy="90" r="9" fill="#3b82f6" />
  <text x="250" y="94" class="badge">1</text>
  <rect x="195" y="100" width="110" height="60" class="box layer-tls" />
  <text x="250" y="126" class="label">TLS Layer</text>
  <text x="250" y="140" class="sub">Encrypt :9090</text>

  <!-- Auth — badge ABOVE box -->
  <circle cx="250" cy="180" r="9" fill="#ec4899" />
  <text x="250" y="184" class="badge">2</text>
  <rect x="195" y="190" width="110" height="70" class="box layer-auth" />
  <text x="250" y="216" class="label">Auth</text>
  <text x="250" y="230" class="sub">JWT verify</text>
  <text x="250" y="242" class="sub">Scope check</text>

  <!-- QuoteService — badge ABOVE box -->
  <circle cx="440" cy="120" r="9" fill="#10b981" />
  <text x="440" y="124" class="badge">3</text>
  <rect x="370" y="130" width="140" height="70" class="box layer-svc" />
  <text x="440" y="156" class="label">QuoteService</text>
  <text x="440" y="170" class="sub">StreamQuotes handler</text>
  <text x="440" y="182" class="sub">Backpressure: drop if slow</text>

  <!-- Engine — badge ABOVE box -->
  <circle cx="635" cy="130" r="9" fill="#1d4ed8" />
  <text x="635" y="134" class="badge">4</text>
  <rect x="570" y="140" width="130" height="60" class="box layer-eng" />
  <text x="635" y="166" class="label-w">MarketDataEngine</text>
  <text x="635" y="180" class="sub-w">subscribe() → ticks</text>

  <!-- Arrows -->
  <line x1="140" y1="175" x2="187" y2="135" class="arrow-b" />
  <line x1="250" y1="160" x2="250" y2="182" class="arrow" />
  <line x1="305" y1="225" x2="362" y2="170" class="arrow" />
  <line x1="510" y1="165" x2="562" y2="165" class="arrow-b" />

  <!-- Return: ticks stream back -->
  <path d="M 570,200 Q 440,290 140,200" class="arrow-back" />
  <text x="360" y="274" class="note">stream of Quote messages back to client</text>

  <!-- Reject path -->
  <line x1="195" y1="250" x2="140" y2="210" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#rf-a)" />
  <text x="120" y="240" class="note" style="fill: #ef4444;" text-anchor="start">UNAUTHENTICATED</text>

  <!-- Legend — dot then gap then text -->
  <rect x="40" y="330" width="640" height="56" rx="8" fill="#f8f9fa" stroke="#e5e7eb" stroke-width="1" />
  <circle cx="62" cy="348" r="6" fill="#3b82f6" />
  <text x="76" y="352" class="legend-text">TLS encrypt</text>
  <circle cx="172" cy="348" r="6" fill="#ec4899" />
  <text x="186" y="352" class="legend-text">JWT auth + scope</text>
  <circle cx="322" cy="348" r="6" fill="#10b981" />
  <text x="336" y="352" class="legend-text">Handler + backpressure</text>
  <circle cx="502" cy="348" r="6" fill="#2563eb" />
  <text x="516" y="352" class="legend-text">Data engine (hub)</text>
  <circle cx="62" cy="370" r="6" fill="#ef4444" />
  <text x="76" y="374" class="legend-text">Rejected (bad/missing token)</text>
  <line x1="260" y1="370" x2="290" y2="370" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" />
  <text x="300" y="374" class="legend-text">Stream response back to client</text>
</svg>
