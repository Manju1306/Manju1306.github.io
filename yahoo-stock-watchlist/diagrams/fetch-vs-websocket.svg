<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Request/Response (fetch) vs WebSocket Streaming</title>
  <desc>Side-by-side comparison showing how fetch works vs how WebSocket streaming works</desc>
  <style>
    .heading { font-family: system-ui, sans-serif; font-size: 15px; fill: #111; font-weight: 700; text-anchor: middle; }
    .subheading { font-family: system-ui, sans-serif; font-size: 13px; fill: #111; font-weight: 600; text-anchor: middle; }
    .lbl { font-family: system-ui, sans-serif; font-size: 11px; fill: #fff; text-anchor: middle; font-weight: 600; }
    .box { rx: 6; ry: 6; stroke-width: 1.5; }
    .you { fill: #2563eb; }
    .server { fill: #10b981; }
    .arrow-req { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arr-blue); }
    .arrow-res { stroke: #10b981; stroke-width: 2; fill: none; marker-end: url(#arr-green); }
    .arrow-dim { stroke: #ccc; stroke-width: 1; stroke-dasharray: 4,3; fill: none; }
    .tick-label { font-family: monospace; font-size: 9px; fill: #10b981; text-anchor: start; }
    .note { font-family: system-ui, sans-serif; font-size: 10px; fill: #888; text-anchor: middle; font-style: italic; }
  </style>
  <defs>
    <marker id="arr-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#2563eb" />
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#10b981" />
    </marker>
  </defs>

  <text x="360" y="28" class="heading">fetch() vs WebSocket — Two Models</text>

  <!-- LEFT: fetch -->
  <rect x="20" y="48" width="330" height="268" rx="10" fill="#f8f9fa" stroke="#e5e7eb" stroke-width="1" />
  <text x="185" y="72" class="subheading">Request / Response (fetch)</text>

  <rect x="60" y="88" width="60" height="28" class="box you" />
  <text x="90" y="106" class="lbl">You</text>
  <rect x="240" y="88" width="60" height="28" class="box server" />
  <text x="270" y="106" class="lbl">Server</text>

  <line x1="90" y1="116" x2="90" y2="296" class="arrow-dim" />
  <line x1="270" y1="116" x2="270" y2="296" class="arrow-dim" />

  <line x1="90" y1="140" x2="262" y2="140" class="arrow-req" />
  <text x="180" y="134" class="note">ask</text>
  <line x1="270" y1="160" x2="98" y2="160" class="arrow-res" />
  <text x="180" y="176" class="note">one answer, close</text>

  <line x1="90" y1="200" x2="262" y2="200" class="arrow-req" />
  <text x="180" y="194" class="note">ask again</text>
  <line x1="270" y1="220" x2="98" y2="220" class="arrow-res" />
  <text x="180" y="236" class="note">one answer, close</text>

  <line x1="90" y1="260" x2="262" y2="260" class="arrow-req" />
  <text x="180" y="254" class="note">ask again…</text>
  <line x1="270" y1="280" x2="98" y2="280" class="arrow-res" />
  <text x="180" y="296" class="note">wasteful polling</text>

  <!-- RIGHT: WebSocket -->
  <rect x="370" y="48" width="330" height="268" rx="10" fill="#f8f9fa" stroke="#e5e7eb" stroke-width="1" />
  <text x="535" y="72" class="subheading">WebSocket (streaming)</text>

  <rect x="410" y="88" width="60" height="28" class="box you" />
  <text x="440" y="106" class="lbl">You</text>
  <rect x="590" y="88" width="60" height="28" class="box server" />
  <text x="620" y="106" class="lbl">Server</text>

  <line x1="440" y1="116" x2="440" y2="296" class="arrow-dim" />
  <line x1="620" y1="116" x2="620" y2="296" class="arrow-dim" />

  <rect x="445" y="136" width="170" height="156" rx="4" fill="#2563eb" opacity="0.06" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,2" />

  <line x1="440" y1="140" x2="612" y2="140" class="arrow-req" />
  <text x="530" y="134" class="note">open (stays open)</text>

  <line x1="620" y1="170" x2="448" y2="170" class="arrow-res" />
  <text x="648" y="174" class="tick-label">tick</text>
  <line x1="620" y1="200" x2="448" y2="200" class="arrow-res" />
  <text x="648" y="204" class="tick-label">tick</text>
  <line x1="620" y1="230" x2="448" y2="230" class="arrow-res" />
  <text x="648" y="234" class="tick-label">tick</text>
  <line x1="620" y1="260" x2="448" y2="260" class="arrow-res" />
  <text x="648" y="264" class="tick-label">tick</text>
  <line x1="620" y1="290" x2="448" y2="290" class="arrow-res" />
  <text x="648" y="294" class="tick-label">tick</text>

  <text x="530" y="306" class="note">server pushes whenever price moves</text>
</svg>
