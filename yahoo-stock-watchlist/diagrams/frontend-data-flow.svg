<svg viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Frontend Data Flow — One Socket, Many Symbols</title>
  <desc>Data flow from App.tsx through useYahooStream hook down to rendered watchlists, showing three core files</desc>
  <style>
    .heading { font-family: system-ui, sans-serif; font-size: 15px; fill: #111; font-weight: 700; text-anchor: middle; }
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .primary { fill: #2563eb; stroke: #2563eb; }
    .file { fill: #fef3c7; stroke: #f59e0b; }
    .neutral { fill: #f3f4f6; stroke: #d1d5db; }
    .label { font-family: system-ui, sans-serif; font-size: 12px; fill: #111; text-anchor: middle; font-weight: 600; }
    .label-w { font-family: system-ui, sans-serif; font-size: 12px; fill: #fff; text-anchor: middle; font-weight: 600; }
    .sub { font-family: system-ui, sans-serif; font-size: 10px; fill: #666; text-anchor: middle; }
    .sub-w { font-family: system-ui, sans-serif; font-size: 10px; fill: rgba(255,255,255,0.8); text-anchor: middle; }
    .file-label { font-family: monospace; font-size: 10px; fill: #92400e; text-anchor: middle; font-weight: 600; }
    .note { font-family: system-ui, sans-serif; font-size: 10px; fill: #888; text-anchor: start; font-style: italic; }
    .arrow { stroke: #999; stroke-width: 1.5; fill: none; marker-end: url(#fd-ah); }
    .arrow-b { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#fd-ahb); }
    .step-badge { font-family: system-ui, sans-serif; font-size: 9px; fill: #fff; text-anchor: middle; font-weight: 700; }
  </style>
  <defs>
    <marker id="fd-ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#999" /></marker>
    <marker id="fd-ahb" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#2563eb" /></marker>
  </defs>

  <text x="360" y="28" class="heading">Frontend Data Flow — One Socket, Many Symbols</text>

  <rect x="250" y="50" width="220" height="52" class="box primary" />
  <text x="360" y="72" class="label-w">App.tsx</text>
  <text x="360" y="86" class="sub-w">Owns watchlists (source of truth)</text>

  <line x1="360" y1="102" x2="360" y2="138" class="arrow-b" />
  <text x="370" y="124" class="note">computes union of all symbols (deduped)</text>

  <rect x="220" y="140" width="280" height="56" class="box primary" />
  <text x="360" y="162" class="label-w">useYahooStream(symbols)</text>
  <text x="360" y="176" class="sub-w">One WebSocket for ALL symbols</text>

  <line x1="290" y1="196" x2="140" y2="244" class="arrow" />
  <line x1="360" y1="196" x2="360" y2="244" class="arrow" />
  <line x1="430" y1="196" x2="580" y2="244" class="arrow" />

  <!-- File 1: yahooSchema.ts — badge to the LEFT of box -->
  <rect x="510" y="244" width="160" height="52" class="box file" />
  <text x="590" y="262" class="file-label">yahooSchema.ts</text>
  <text x="590" y="278" class="sub">Decode protobuf frames</text>
  <circle cx="496" cy="252" r="9" fill="#f59e0b" />
  <text x="496" y="256" class="step-badge">1</text>

  <!-- File 2: useYahooStream.ts — badge to the LEFT -->
  <rect x="50" y="244" width="180" height="52" class="box file" />
  <text x="140" y="262" class="file-label">useYahooStream.ts</text>
  <text x="140" y="278" class="sub">Connect + merge state</text>
  <circle cx="36" cy="252" r="9" fill="#f59e0b" />
  <text x="36" y="256" class="step-badge">2</text>

  <!-- File 3: yahooSnapshot.ts — badge to the LEFT -->
  <rect x="270" y="244" width="180" height="52" class="box file" />
  <text x="360" y="262" class="file-label">yahooSnapshot.ts</text>
  <text x="360" y="278" class="sub">REST fill for missing fields</text>
  <circle cx="256" cy="252" r="9" fill="#f59e0b" />
  <text x="256" y="256" class="step-badge">3</text>

  <line x1="140" y1="296" x2="300" y2="346" class="arrow" />
  <line x1="360" y1="296" x2="360" y2="346" class="arrow" />
  <line x1="590" y1="296" x2="420" y2="346" class="arrow" />

  <rect x="240" y="348" width="240" height="44" class="box neutral" />
  <text x="360" y="368" class="label" style="font-family: monospace;">quotes: { AAPL: {…}, BTC: {…} }</text>
  <text x="360" y="382" class="sub">symbol → latest merged quote</text>

  <line x1="360" y1="392" x2="360" y2="420" class="arrow-b" />

  <rect x="180" y="422" width="120" height="36" class="box neutral" />
  <text x="240" y="444" class="label">Watchlist 1</text>
  <rect x="310" y="422" width="120" height="36" class="box neutral" />
  <text x="370" y="444" class="label">Watchlist 2</text>
  <rect x="440" y="422" width="120" height="36" class="box neutral" />
  <text x="500" y="444" class="label">Watchlist 3</text>
</svg>
