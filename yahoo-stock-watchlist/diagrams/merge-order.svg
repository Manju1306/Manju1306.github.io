<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Merge Order: Stream Frame vs REST Snapshot</title>
  <desc>Shows how spread-merge order determines which data source wins</desc>
  <style>
    .heading { font-family: system-ui, sans-serif; font-size: 15px; fill: #111; font-weight: 700; text-anchor: middle; }
    .subheading { font-family: system-ui, sans-serif; font-size: 13px; fill: #111; font-weight: 600; text-anchor: middle; }
    .code-sm { font-family: monospace; font-size: 10px; fill: #555; text-anchor: middle; }
    .label { font-family: system-ui, sans-serif; font-size: 11px; fill: #111; text-anchor: middle; }
    .sub { font-family: system-ui, sans-serif; font-size: 10px; fill: #666; text-anchor: middle; }
    .win { font-family: system-ui, sans-serif; font-size: 10px; fill: #16a34a; text-anchor: middle; font-weight: 700; }
    .lose { font-family: system-ui, sans-serif; font-size: 10px; fill: #999; text-anchor: middle; }
    .box { rx: 6; ry: 6; stroke-width: 1.5; }
    .stream-box { fill: #dbeafe; stroke: #3b82f6; }
    .snap-box { fill: #fef3c7; stroke: #f59e0b; }
    .result-box { fill: #d1fae5; stroke: #10b981; }
    .arrow { stroke: #999; stroke-width: 1.5; fill: none; marker-end: url(#ma); }
    .plus { font-family: system-ui, sans-serif; font-size: 18px; fill: #888; text-anchor: middle; }
    .legend-text { font-family: system-ui, sans-serif; font-size: 10px; fill: #666; text-anchor: start; }
  </style>
  <defs>
    <marker id="ma" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#999" /></marker>
  </defs>

  <text x="360" y="28" class="heading">Merge Order — Who Wins the Spread?</text>

  <!-- LEFT: Live stream frame -->
  <rect x="20" y="52" width="340" height="146" rx="10" fill="#f8f9fa" stroke="#e5e7eb" stroke-width="1" />
  <text x="190" y="74" class="subheading">Live Stream Tick</text>
  <text x="190" y="92" class="code-sm">{ ...prev[id], ...quote }</text>
  <text x="190" y="106" class="sub">New frame spread LAST → new data wins</text>

  <rect x="40" y="118" width="120" height="36" class="box" style="fill: #eee; stroke: #ccc;" />
  <text x="100" y="134" class="label">prev[AAPL]</text>
  <text x="100" y="148" class="lose">old price: 200</text>

  <text x="180" y="142" class="plus">+</text>

  <rect x="200" y="118" width="140" height="36" class="box stream-box" />
  <text x="270" y="134" class="label">stream frame</text>
  <text x="270" y="148" class="win">price: 201.4 WINS</text>

  <line x1="190" y1="160" x2="190" y2="178" class="arrow" />
  <rect x="130" y="178" width="120" height="14" class="box result-box" />
  <text x="190" y="189" class="code-sm">price: 201.4 ✓</text>

  <!-- RIGHT: REST snapshot -->
  <rect x="380" y="52" width="320" height="146" rx="10" fill="#f8f9fa" stroke="#e5e7eb" stroke-width="1" />
  <text x="540" y="74" class="subheading">REST Snapshot (one-time)</text>
  <text x="540" y="92" class="code-sm">{ ...snap, ...prev[id] }</text>
  <text x="540" y="106" class="sub">Existing data spread LAST → live wins</text>

  <rect x="400" y="118" width="120" height="36" class="box snap-box" />
  <text x="460" y="134" class="label">snapshot</text>
  <text x="460" y="148" class="lose">price: 199 (stale)</text>

  <text x="540" y="142" class="plus">+</text>

  <rect x="560" y="118" width="120" height="36" class="box" style="fill: #eee; stroke: #ccc;" />
  <text x="620" y="134" class="label">prev[AAPL]</text>
  <text x="620" y="148" class="win">price: 201 WINS</text>

  <line x1="540" y1="160" x2="540" y2="178" class="arrow" />
  <rect x="480" y="178" width="120" height="14" class="box result-box" />
  <text x="540" y="189" class="code-sm">price: 201 ✓</text>

  <!-- KEY RULE -->
  <rect x="100" y="222" width="520" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" />
  <text x="360" y="242" class="label" style="fill: #1d4ed8;">Rule: whoever you spread LAST wins.</text>
  <text x="360" y="256" class="sub" style="fill: #1d4ed8;">Put your most-trusted source last.</text>

  <!-- defaults:false explanation with spaced legend dots -->
  <rect x="60" y="286" width="600" height="80" rx="8" fill="#f8f9fa" stroke="#e5e7eb" stroke-width="1" />
  <text x="360" y="308" class="subheading">Why defaults: false matters (yahooSchema.ts)</text>
  <text x="360" y="328" class="code-sm">Frame only has { id: "AAPL", price: 201.4 }</text>

  <circle cx="120" cy="350" r="6" fill="#ef4444" />
  <text x="134" y="354" class="legend-text" style="fill:#ef4444;">defaults:true → dayHigh: 0, dayLow: 0  clobbers!</text>

  <circle cx="400" cy="350" r="6" fill="#16a34a" />
  <text x="414" y="354" class="legend-text" style="fill:#16a34a;">defaults:false → only price sent ✓ safe merge</text>
</svg>
